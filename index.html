      ['סבון ידיים','קליר וניקיון'],['נייר טואלט','קליר וניקיון'],['נייר סופג','קליר וניקיון'],['נייר אלומיניום גדול','קליר וניקיון'],['שקיות זבל גדולות','קליר וניקיון'],['שקיות זבל קטנות','קליר וניקיון'],['סבון כלים','קליר וניקיון'],['מגבונים','קליר וניקיון'],['משחת שיניים פארדונטקס','קליר וניקיון'],['משחת שיניים מלבינה','קליר וניקיון'],['מברשת שיניים רגילה','קליר וניקיון'],['ראש מברשת חשמלית','קליר וניקיון'],['דורדוראנט','קליר וניקיון'],['סבון גוף גבר','קליר וניקיון'],['מרכך הוואי כחול','קליר וניקיון'],['שמפו הד אנד שולדרס','קליר וניקיון'],['מטליות לרצפה','קליר וניקיון'],['מטליות כמו מגבונים 400 יח\'','קליר וניקיון'],['ריחן לאסלה','קליר וניקיון'],['קיסמים לשיניים','קליר וניקיון'],['מקלות אוזניים מעץ','קליר וניקיון'],['נייר אפייה','קליר וניקיון'],['נוזל לסתימות','קליר וניקיון'],['מסיר שומנים','קליר וניקיון'],['אבקת כביסה','קליר וניקיון'],['מרכך כביסה','קליר וניקיון'],['קרם גוף','קליר וניקיון'],['מסיר לק','קליר וניקיון'],['חוט דנטלי','קליר וניקיון'],['אבקה מקציפה לאסלה','קליר וניקיון'],['קצף ניקוי עם אקונומיקה','קליר וניקיון'],['מטליות מיקרופייבר למטבח','קליר וניקיון'],['מנקה לשון','קליר וניקיון'],['כפפות סיליקון','קליר וניקיון'],['סקוצ לשטיפת כלים','קליר וניקיון'],['שקיות אוכל','קליר וניקיון']
    ];

    const categoryOrder = ['מוצרי חלב','בשר דגים וקפואים','מוצרי אפייה','אלכוהול','שתייה מתוקה','מתוקים','יבשים ושימורים','לחמים וקמחים','רטבים ותבלינים','ירקות ופירות','קליר וניקיון','אחר'];
    const hebrewSorter = new Intl.Collator('he');
    const $ = id => document.getElementById(id);

    let customProducts = [];
    let customCategories = [];
    let products = [];
    let cats = [];
    let active = 'רשימת קניות';
    let selected = null;
    let editId = null;
    let cart = [];
    let visibleProducts = [];
    let productEditOriginalName = null;
    let editedProductImage = null;
    let imageWasRemoved = false;
    let manualImageData = '';
    let favorites = {};
    let history = [];

    function normalizeCategory(name, cat) {
      if (cat === 'מתוקים ושתייה') {
        if (['בירות','יין לבן'].includes(name)) return 'אלכוהול';
        if (['סודה לימון','תה'].includes(name)) return 'שתייה מתוקה';
        return 'מתוקים';
      }
      if (['אבקת אפייה','סודה לשתייה','סוכר וניל','קקאו איכותי','שוקולד צ\'יפס מריר','שוקולד קוביות מריר','קמח לבן','קמח לבן מנופה','קמח תופח','קמח תירס','קמח 00 / קמח פיצה','נייר אפייה'].includes(name)) return 'מוצרי אפייה';
      return cat || 'אחר';
    }

    function productImage(name) {
      const p = products.find(x => x[0] === name);
      return p && p[3] ? p[3] : '';
    }

    function categoryIndex(cat) {
      const i = categoryOrder.indexOf(cat || 'אחר');
      return i === -1 ? 999 : i;
    }

    function productCategory(name) {
      const p = products.find(x => x[0] === name);
      return p ? p[1] : 'אחר';
    }

    function sortProducts(arr) {
      return [...arr].sort((a,b) => categoryIndex(a[1]) - categoryIndex(b[1]) || hebrewSorter.compare(a[0], b[0]));
    }

    function sortCart(arr) {
      return [...arr].sort((a,b) => categoryIndex(productCategory(a.name)) - categoryIndex(productCategory(b.name)) || hebrewSorter.compare(a.name, b.name));
    }

    function productKey(name) {
      return encodeURIComponent(name).replace(/\./g, '%2E');
    }

    function isFavorite(name) {
      return Boolean(favorites[productKey(name)]);
    }

    function formatDateTime(ts) {
      return new Date(ts || Date.now()).toLocaleString('he-IL', { dateStyle: 'short', timeStyle: 'short' });
    }

    function isInCart(name) {
      return cart.some(x => x.name === name);
    }

    let toastTimer = null;
    function showToast(message) {
      const toast = $('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function rebuildProducts() {
      const editedDefaultNames = new Set(customProducts.filter(p => p[4]).map(p => p[4]));
      const deletedDefaultNames = new Set(customProducts.filter(p => p[5]).map(p => p[5]));
      const normalizedDefaults = defaultProducts
        .filter(p => !editedDefaultNames.has(p[0]) && !deletedDefaultNames.has(p[0]))
        .map(p => [p[0], normalizeCategory(p[0], p[1]), null, '']);
      const normalizedCustom = customProducts
        .filter(p => !p[5])
        .map(p => [p[0], normalizeCategory(p[0], p[1]), p[2], p[3] || '', p[4] || null]);
      products = sortProducts([...normalizedDefaults, ...normalizedCustom]);
      const existing = [...new Set([...products.map(p => p[1]), ...customCategories])];
      cats = ['רשימת קניות', 'רשימת הבית', ...categoryOrder.filter(c => existing.includes(c)), ...existing.filter(c => !categoryOrder.includes(c)).sort(hebrewSorter.compare), 'היסטוריית קניות'];
      if (!cats.includes(active)) active = 'רשימת קניות';
      renderTabs();
      renderItems();
      renderCart();
    }

    function persistProduct(name, cat, imageData = '') {
      const clean = name.trim();
      if (!clean) return;
      if (products.some(p => p[0] === clean)) return;
      customProductsRef.push({ name: clean, category: cat || 'אחר', imageData: imageData || '', createdAt: Date.now() });
    }

    function renderManualCategories() {
      const select = $('manualCat');
      if (!select) return;
      const options = cats.filter(c => !['רשימת קניות','רשימת הבית','היסטוריית קניות'].includes(c));
      select.innerHTML = options.map(c => `<option value="${c}">${c}</option>`).join('');
      if (!['רשימת קניות','רשימת הבית','היסטוריית קניות'].includes(active) && options.includes(active)) select.value = active;
    }

    function renderTabs() {
      $('tabs').innerHTML = cats.map(c => `<button class="tab ${c===active?'active':''}" data-cat="${c}">${c}</button>`).join('');
      document.querySelectorAll('.tab').forEach(btn => {
        btn.onclick = () => {
          active = btn.dataset.cat;
          if (active === 'רשימת הבית') addFavoritesToCart();
          renderTabs();
          renderManualCategories();
          renderItems();
        };
      });
      renderManualCategories();
    }

    function isCustomProduct(p) {
      return Boolean(p[2]);
    }

    function itemCard(p, idx) {
      const img = p[3] ? `<img class="prodImg" src="${p[3]}" alt="${p[0]}">` : '';
      const favClass = isFavorite(p[0]) ? 'miniBtn favorite on' : 'miniBtn favorite';
      const actions = `<button class="${favClass}" data-product-fav="${idx}" title="הוספה/הסרה מרשימת הבית">⭐</button><button class="miniBtn" data-product-image="${idx}" title="הוספת תמונה מהגלריה">📷</button><button class="miniBtn" data-product-edit="${idx}" title="עריכת מוצר">✏️</button><button class="miniBtn" data-product-move="${idx}" title="העברת קטגוריה">🔄</button><button class="miniBtn delete" data-product-delete="${idx}" title="מחיקת מוצר">🗑️</button>`;
      return `<div class="item">${img}<b>${p[0]}</b><span class="cat">${p[1]}</span><div class="productActions"><button class="add" data-idx="${idx}">+ הוסף</button>${actions}</div></div>`;
    }

    function bindAddButtons() {
      document.querySelectorAll('.add[data-idx]').forEach(btn => {
        btn.onclick = () => {
          const product = visibleProducts[Number(btn.dataset.idx)];
          if (product) openAdd(product[0]);
        };
      });
      document.querySelectorAll('[data-product-fav]').forEach(btn => {
        btn.onclick = () => {
          const product = visibleProducts[Number(btn.dataset.productFav)];
          if (product) toggleFavorite(product);
        };
      });
      document.querySelectorAll('[data-product-image]').forEach(btn => {
        btn.onclick = () => {
          const product = visibleProducts[Number(btn.dataset.productImage)];
          if (product) openProductEdit(product);
        };
      });
      document.querySelectorAll('[data-product-edit]').forEach(btn => {
        btn.onclick = () => {
          const product = visibleProducts[Number(btn.dataset.productEdit)];
          if (product) openProductEdit(product);
        };
      });
      document.querySelectorAll('[data-product-move]').forEach(btn => {
        btn.onclick = () => {
          const product = visibleProducts[Number(btn.dataset.productMove)];
          if (product) openProductEdit(product);
        };
      });
      document.querySelectorAll('[data-product-delete]').forEach(btn => {
        btn.onclick = () => {
          const product = visibleProducts[Number(btn.dataset.productDelete)];
          if (product) deleteProduct(product);
        };
      });
    }

    function renderItems() {
      const grid = document.querySelector('.grid');
      grid.classList.toggle('onlyCatalog', !['רשימת קניות','רשימת הבית','היסטוריית קניות'].includes(active));
      grid.classList.toggle('onlyCart', ['רשימת קניות','היסטוריית קניות'].includes(active));

      const q = $('search').value.trim();
      const targetResults = $('items');
      const targetCatalog = $('catalog');
      const resultsPanel = $('resultsPanel');

      const searchFiltered = sortProducts(products.filter(p => (!q || p[0].includes(q) || p[1].includes(q))));
      if (q) {
        visibleProducts = searchFiltered;
        resultsPanel.classList.remove('hide');
        targetResults.innerHTML = searchFiltered.length ? searchFiltered.map((p, idx) => itemCard(p, idx)).join('') : '<div class="empty">לא נמצאו מוצרים</div>';
      } else {
        resultsPanel.classList.add('hide');
        targetResults.innerHTML = '';
      }

      if (active === 'רשימת קניות') {
        $('cartTitle').textContent = 'רשימת קניות';
        $('catalogTitle').textContent = 'מאגר מוצרים';
        targetCatalog.innerHTML = '';
        renderCart();
        bindAddButtons();
        return;
      }

      if (active === 'היסטוריית קניות') {
        $('cartTitle').textContent = 'היסטוריית קניות';
        $('catalogTitle').textContent = 'מאגר מוצרים';
        targetCatalog.innerHTML = '';
        renderHistory();
        bindAddButtons();
        return;
      }

      if (active === 'רשימת הבית') {
        $('catalogTitle').textContent = 'רשימת הבית';
        const favProducts = sortProducts(products.filter(p => isFavorite(p[0]) && (!q || p[0].includes(q) || p[1].includes(q))));
        visibleProducts = favProducts;
        targetCatalog.innerHTML = '<div class="homeBar"><button id="addHomeListBtn">⭐ הוסף את רשימת הבית לקניות</button></div>' + (favProducts.length ? favProducts.map((p, idx) => itemCard(p, idx)).join('') : '<div class="empty">אין עדיין מוצרים שסומנו בכוכב</div>');
        setTimeout(() => { const b = $('addHomeListBtn'); if (b) b.onclick = addFavoritesToCart; }, 0);
        bindAddButtons();
        return;
      }

      $('cartTitle').textContent = 'רשימת קניות';
      $('catalogTitle').textContent = 'מאגר מוצרים';
      const filtered = sortProducts(products.filter(p => p[1] === active && (!q || p[0].includes(q) || p[1].includes(q))));
      visibleProducts = filtered;
      targetCatalog.innerHTML = filtered.length ? filtered.map((p, idx) => itemCard(p, idx)).join('') : '<div class="empty">לא נמצאו מוצרים</div>';
      bindAddButtons();
    }

    function openProductEdit(product) {
      productEditOriginalName = product[0];
      editedProductImage = product[3] || '';
      imageWasRemoved = false;
      $('editProductName').value = product[0];
      const select = $('editProductCat');
      const options = cats.filter(c => !['רשימת קניות','רשימת הבית','היסטוריית קניות'].includes(c));
      select.innerHTML = options.map(c => `<option value="${c}">${c}</option>`).join('');
      select.value = product[1];
      updateImagePreview();
      $('productModal').classList.add('show');
    }

    function updateImagePreview() {
      const preview = $('imagePreview');
      if (editedProductImage && !imageWasRemoved) {
        preview.src = editedProductImage;
        preview.style.display = 'block';
      } else {
        preview.removeAttribute('src');
        preview.style.display = 'none';
      }
    }

    function saveProductEditNow() {
      const newName = $('editProductName').value.trim();
      const newCat = $('editProductCat').value;
      if (!newName || !productEditOriginalName) return;

      const original = products.find(p => p[0] === productEditOriginalName);
      const customId = original && original[2];
      const imageData = imageWasRemoved ? '' : (editedProductImage || '');

      if (customId) {
        customProductsRef.child(customId).update({ name: newName, category: newCat, imageData, updatedAt: Date.now() });
      } else {
        customProductsRef.push({ name: newName, category: newCat, imageData, createdAt: Date.now(), editedFromDefault: productEditOriginalName });
      }

      cart.filter(x => x.name === productEditOriginalName).forEach(x => {
        cartRef.child(x.id).update({ name: newName, updatedAt: Date.now() });
      });

      $('productModal').classList.remove('show');
      productEditOriginalName = null;
      editedProductImage = null;
      imageWasRemoved = false;
      $('editProductImage').value = '';
    }

    function deleteProduct(product) {
      const name = product[0];
      const customId = product[2];
      if (customId) {
        customProductsRef.child(customId).remove();
      } else {
        customProductsRef.push({ deletedDefault: name, createdAt: Date.now() });
      }
      cart.filter(x => x.name === name).forEach(x => {
        cartRef.child(x.id).remove();
      });
    }

    function renderCart() {
      $('countPill').textContent = cart.length + ' פריטים ממתינים לקנייה';
      if (!cart.length) {
        $('cart').innerHTML = '<div class="empty">אין כרגע פריטים לקנייה</div>';
        return;
      }

      const sorted = sortCart(cart);
      const allCats = [...categoryOrder, ...new Set(sorted.map(x => productCategory(x.name)).filter(c => !categoryOrder.includes(c)))];
      let html = '';

      allCats.forEach(c => {
        const group = sorted.filter(x => productCategory(x.name) === c);
        if (!group.length) return;
        html += `<div class="groupTitle">${c} <small>(${group.length})</small></div>`;
        group.forEach(x => {
          html += `<div class="cartItem"><div class="cartTop"><div>${productImage(x.name) ? `<img class="prodImg" src="${productImage(x.name)}" alt="${x.name}">` : ''}<b>${x.name}</b><div class="meta">${x.qty || 'ללא כמות'}${x.note ? ' · ' + x.note : ''}</div></div><div class="iconActions"><button class="iconBtn edit" data-edit="${x.id}" title="עריכה">✏️</button><button class="iconBtn delete" data-delete="${x.id}" title="מחיקה">🗑️</button><button class="iconBtn done" data-id="${x.id}" title="נקנה">✅</button></div></div></div>`;
        });
      });

      $('cart').innerHTML = html;
      document.querySelectorAll('.iconBtn.done[data-id]').forEach(btn => {
        btn.onclick = () => markBought(btn.dataset.id);
      });
      document.querySelectorAll('.iconBtn.delete[data-delete]').forEach(btn => {
        btn.onclick = () => deleteItem(btn.dataset.delete);
      });
      document.querySelectorAll('.iconBtn.edit[data-edit]').forEach(btn => {
        btn.onclick = () => openEdit(btn.dataset.edit);
      });
    }

    function toggleFavorite(product) {
      const key = productKey(product[0]);
      if (isFavorite(product[0])) {
        favoritesRef.child(key).remove();
        showToast('הוסר מרשימת הבית');
      } else {
        favoritesRef.child(key).set({ name: product[0], category: product[1], createdAt: Date.now() });
        showToast('⭐ נוסף לרשימת הבית');
      }
    }

    function addFavoritesToCart() {
      const favProducts = products.filter(p => isFavorite(p[0]));
      let added = 0;
      favProducts.forEach(p => {
        if (!isInCart(p[0])) {
          cartRef.push({ name: p[0], qty: '', note: '', createdAt: Date.now(), updatedAt: Date.now() });
          added++;
        }
      });
      if (favProducts.length) showToast(added ? `⭐ נוספו ${added} פריטים לרשימת הקניות` : 'כל פריטי הבית כבר נמצאים ברשימה');
    }

    function renderHistory() {
      if (!history.length) {
        $('cart').innerHTML = '<div class="empty">אין עדיין היסטוריית קניות</div>';
        return;
      }
      const sorted = [...history].sort((a,b) => (b.boughtAt || 0) - (a.boughtAt || 0));
      $('cart').innerHTML = sorted.map(x => `<div class="historyItem"><div class="cartTop"><div><b>${x.name}</b><div class="meta">${formatDateTime(x.boughtAt)}${x.qty ? ' · ' + x.qty : ''}${x.note ? ' · ' + x.note : ''}</div></div><button class="iconBtn delete" data-history-delete="${x.id}" title="מחיקה מהיסטוריה">🗑️</button></div></div>`).join('');
      document.querySelectorAll('[data-history-delete]').forEach(btn => {
        btn.onclick = () => historyRef.child(btn.dataset.historyDelete).remove();
      });
    }

    function openAdd(name) {
      if (isInCart(name)) {
        showToast('⚠️ הפריט כבר נמצא ברשימה');
        return;
      }
      selected = name;
      editId = null;
      $('modalTitle').textContent = name;
      $('confirmAdd').textContent = 'הוסף לרשימה';
      $('qty').value = '';
      $('note').value = '';
      $('modal').classList.add('show');
      setTimeout(() => $('qty').focus(), 100);
    }

    function openEdit(id) {
      const item = cart.find(x => x.id === id);
      if (!item) return;
      selected = item.name;
      editId = id;
      $('modalTitle').textContent = 'עריכת ' + item.name;
      $('confirmAdd').textContent = 'שמור שינוי';
      $('qty').value = item.qty || '';
      $('note').value = item.note || '';
      $('modal').classList.add('show');
      setTimeout(() => $('qty').focus(), 100);
    }

    function markBought(id) {
      const item = cart.find(x => x.id === id);
      if (item) {
        historyRef.push({ name: item.name, qty: item.qty || '', note: item.note || '', boughtAt: Date.now() });
      }
      cartRef.child(id).remove();
    }

    function deleteItem(id) {
      cartRef.child(id).remove();
    }

    function addToCart(item) {
      if (isInCart(item.name)) {
        showToast('⚠️ הפריט כבר נמצא ברשימה');
        return false;
      }
      cartRef.push(item);
      return true;
    }

    $('confirmAdd').onclick = () => {
      if (!selected) return;
      const payload = {
        name: selected,
        qty: $('qty').value.trim(),
        note: $('note').value.trim(),
        updatedAt: Date.now()
      };

      if (editId) {
        cartRef.child(editId).update(payload);
      } else if (!addToCart({ ...payload, createdAt: Date.now() })) {
        return;
      }

      $('modal').classList.remove('show');
      selected = null;
      editId = null;
      $('confirmAdd').textContent = 'הוסף לרשימה';
    };

    $('cancel').onclick = () => { $('modal').classList.remove('show'); editId = null; selected = null; $('confirmAdd').textContent = 'הוסף לרשימה'; };
    $('modal').onclick = e => { if (e.target.id === 'modal') $('modal').classList.remove('show'); };
    $('saveProductEdit').onclick = saveProductEditNow;
    $('cancelProductEdit').onclick = () => { $('productModal').classList.remove('show'); productEditOriginalName = null; editedProductImage = null; imageWasRemoved = false; $('editProductImage').value = ''; };
    $('productModal').onclick = e => { if (e.target.id === 'productModal') { $('productModal').classList.remove('show'); productEditOriginalName = null; editedProductImage = null; imageWasRemoved = false; $('editProductImage').value = ''; } };
    function resizeImageFile(file, cb) {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const maxSide = 700;
          const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          cb(canvas.toDataURL('image/jpeg', 0.78));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    $('editProductImage').onchange = e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      resizeImageFile(file, dataUrl => {
        editedProductImage = dataUrl;
        imageWasRemoved = false;
        updateImagePreview();
      });
    };

    $('removeProductImage').onclick = () => {
      editedProductImage = '';
      imageWasRemoved = true;
      $('editProductImage').value = '';
      updateImagePreview();
    };

    $('manualImage').onchange = e => {
      const file = e.target.files && e.target.files[0];
      if (!file) { manualImageData = ''; return; }
      resizeImageFile(file, dataUrl => {
        manualImageData = dataUrl;
      });
    };

    $('addCategoryBtn').onclick = () => {
      const name = $('newCategoryName').value.trim();
      if (!name || cats.includes(name)) return;
      customCategoriesRef.push({ name, createdAt: Date.now() });
      $('newCategoryName').value = '';
      active = name;
    };
    $('search').oninput = renderItems;

    $('manualBtn').onclick = () => {
      const n = $('manualName').value.trim();
      if (n) {
        if (isInCart(n)) {
          showToast('⚠️ הפריט כבר נמצא ברשימה');
          return;
        }
        const cat = $('manualCat').value || (['רשימת קניות','רשימת הבית','היסטוריית קניות'].includes(active) ? 'אחר' : active);
        persistProduct(n, cat, manualImageData);
        openAdd(n);
        $('manualName').value = '';
        $('manualImage').value = '';
        manualImageData = '';
      }
    };

    customProductsRef.on('value', snap => {
      const val = snap.val() || {};
      customProducts = Object.entries(val).map(([id, x]) => [x.name || '', x.category || 'אחר', id, x.imageData || '', x.editedFromDefault || null, x.deletedDefault || null]).filter(x => x[0] || x[5]);
      rebuildProducts();
    });

    customCategoriesRef.on('value', snap => {
      const val = snap.val() || {};
      customCategories = Object.values(val).map(x => x.name).filter(Boolean);
      rebuildProducts();
    });

    cartRef.on('value', snap => {
      const val = snap.val() || {};
      cart = sortCart(Object.entries(val).map(([id, x]) => ({ id, ...x })));
      if (active === 'רשימת קניות') renderCart();
      else renderItems();
    });

    favoritesRef.on('value', snap => {
      favorites = snap.val() || {};
      renderItems();
    });

    historyRef.on('value', snap => {
      const val = snap.val() || {};
      history = Object.entries(val).map(([id, x]) => ({ id, ...x }));
      if (active === 'היסטוריית קניות') renderHistory();
    });

    rebuildProducts();
  </script>

</body>
</html>
