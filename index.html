function firebaseFail(e){ online=false; setStatus('מצב מקומי בלבד: בעיית Firebase'); showToast('Firebase חסום/אין הרשאה: ' + (e.message||e)); loadAllLocal(); renderAll(); }
function loadAllLocal(){ cart=loadLocal('cart',[]); customProducts=loadLocal('customProducts',[]); favorites=loadLocal('favorites',{}); history=loadLocal('history',[]); rebuildProducts(); }
function writePush(collection, data){ if(online && refs[collection]){ const r=refs[collection].push(); r.set(data, err=>{ if(err){ showToast('שגיאת Firebase, נשמר מקומית'); online=false; writePush(collection,data); } }); return; } const item={id:'local_'+Date.now()+'_'+Math.random().toString(16).slice(2),...data}; if(collection==='cart'){cart.push(item);saveLocal('cart',cart)} if(collection==='customProducts'){customProducts.push(item);saveLocal('customProducts',customProducts);rebuildProducts()} if(collection==='history'){history.push(item);saveLocal('history',history)} renderAll(); }
function writeUpdate(collection,id,data){ if(online && refs[collection]) refs[collection].child(id).update(data); else { const arr=collection==='cart'?cart:customProducts; const i=arr.findIndex(x=>x.id===id); if(i>=0) Object.assign(arr[i],data); saveLocal(collection,arr); renderAll(); } }
function writeRemove(collection,id){ if(online && refs[collection]) refs[collection].child(id).remove(); else { let arr=collection==='cart'?cart:collection==='history'?history:customProducts; arr=arr.filter(x=>x.id!==id); if(collection==='cart') cart=arr; if(collection==='history') history=arr; if(collection==='customProducts') customProducts=arr; saveLocal(collection,arr); renderAll(); } }
function setFavorite(name,on,cat){ const key=safeKey(name); if(online&&refs.favorites){ on?refs.favorites.child(key).set({name,category:cat,createdAt:Date.now()}):refs.favorites.child(key).remove(); } else { if(on) favorites[key]={name,category:cat,createdAt:Date.now()}; else delete favorites[key]; saveLocal('favorites',favorites); renderAll(); } }
function rebuildProducts(){ const customNames=new Set(customProducts.map(p=>p.name)); const defs=defaultProducts.map(p=>({id:null,name:p[0],category:normalizeCategory(p[0],p[1]),imageData:''})).filter(p=>!customNames.has(p.name)); const customs=customProducts.map(p=>({id:p.id,name:p.name,category:normalizeCategory(p.name,p.category),imageData:p.imageData||''})); products=sortProducts([...defs,...customs]); }
function cats(){ const existing=[...new Set(products.map(p=>p.category))]; return ['רשימת קניות','רשימת הבית',...categoryOrder.filter(c=>existing.includes(c)),...existing.filter(c=>!categoryOrder.includes(c)).sort(hebrewSorter.compare),'היסטוריית קניות']; }
function isFav(name){ return !!favorites[safeKey(name)]; }
function isInCart(name){ return cart.some(x=>x.name===name); }
function renderTabs(){ $('tabs').innerHTML=cats().map(c=>`<button type="button" class="tab ${c===active?'active':''}" data-tab="${c}">${c}</button>`).join(''); $('manualCat').innerHTML=cats().filter(c=>!specialTabs.includes(c)).map(c=>`<option value="${c}">${c}</option>`).join(''); }
function escAttr(v){ return String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function productImage(name){ const p=products.find(x=>x.name===name); return p&&p.imageData?p.imageData:''; }
function card(p){ const nm=escAttr(p.name); const img=p.imageData?`<img class="prodImg" src="${p.imageData}" alt="${nm}">`:''; return `<div class="item" data-name="${nm}">${img}<b>${p.name}</b><div class="cat">${p.category}</div><div class="productActions"><button type="button" class="add" data-action="add" data-name="${nm}">+ הוסף</button><button type="button" class="miniBtn ${isFav(p.name)?'on':''}" data-action="fav" data-name="${nm}">⭐</button><button type="button" class="miniBtn" data-action="image" data-name="${nm}" title="הוספה/החלפת תמונה">📷</button></div></div>`; }
function renderItems(){ const q=$('search').value.trim(); const grid=document.querySelector('.grid'); const showCartPanel=(active==='רשימת קניות'||active==='היסטוריית קניות'); document.querySelector('.cartPanel').classList.toggle('hide',!showCartPanel); grid.classList.toggle('catalogOnly',!showCartPanel); const filtered=products.filter(p=>(!q||p.name.includes(q)||p.category.includes(q))); $('resultsPanel').classList.toggle('hide',!q); $('items').innerHTML=q?(filtered.length?filtered.map(card).join(''):'<div class="empty">לא נמצאו מוצרים</div>'):''; $('catalogTitle').textContent=active==='רשימת הבית'?'רשימת הבית':'מאגר מוצרים'; if(active==='רשימת קניות'||active==='היסטוריית קניות'){ $('catalog').innerHTML=''; return; } let list=active==='רשימת הבית'?products.filter(p=>isFav(p.name)):products.filter(p=>p.category===active); if(q) list=list.filter(p=>p.name.includes(q)||p.category.includes(q)); $('catalog').innerHTML=list.length?list.map(card).join(''):'<div class="empty">אין מוצרים להצגה</div>'; }
function renderCart(){ $('countPill').textContent=cart.length+' פריטים ממתינים לקנייה'; if(active==='היסטוריית קניות'){ $('cartTitle').textContent='היסטוריית קניות'; $('cart').innerHTML=history.length?history.slice().reverse().map(x=>`<div class="historyItem"><b>${x.name}</b><div class="meta">${new Date(x.boughtAt||Date.now()).toLocaleString('he-IL')} ${x.qty||''} ${x.note||''}</div></div>`).join(''):'<div class="empty">אין עדיין היסטוריית קניות</div>'; return; } $('cartTitle').textContent='רשימת קניות'; if(!cart.length){ $('cart').innerHTML='<div class="empty">אין כרגע פריטים לקנייה</div>'; return; } $('cart').innerHTML=sortCart(cart).map(x=>`<div class="cartItem"><div class="cartTop"><div>${productImage(x.name)?`<img class="prodImg" src="${productImage(x.name)}" alt="${escAttr(x.name)}">`:''}<b>${x.name}</b><div class="meta">${x.qty||'ללא כמות'}${x.note?' · '+x.note:''}</div></div><div class="iconActions"><button type="button" class="iconBtn" data-action="editCart" data-id="${x.id}">✏️</button><button type="button" class="iconBtn delete" data-action="delCart" data-id="${x.id}">🗑️</button><button type="button" class="iconBtn done" data-action="done" data-id="${x.id}">✅</button></div></div></div>`).join(''); }
function renderAll(){ if(!cats().includes(active)) active='רשימת קניות'; renderTabs(); renderItems(); renderCart(); }

function resizeImageFile(file, cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const maxSide=800;
      const scale=Math.min(1,maxSide/Math.max(img.width,img.height));
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      cb(canvas.toDataURL('image/jpeg',0.78));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function saveProductImage(name, imageData){
  const p=products.find(x=>x.name===name);
  const cat=p?p.category:'אחר';
  if(p&&p.id) writeUpdate('customProducts',p.id,{imageData,updatedAt:Date.now()});
  else writePush('customProducts',{name,category:cat,imageData,createdAt:Date.now()});
  showToast('📷 התמונה נשמרה לפריט');
}

function openAdd(name){ if(isInCart(name)) return showToast('⚠️ הפריט כבר נמצא ברשימה'); selected=name; editId=null; $('modalTitle').textContent=name; $('qty').value=''; $('note').value=''; $('confirmAdd').textContent='הוסף לרשימה'; $('modal').classList.add('show'); }
function openEdit(id){ const item=cart.find(x=>x.id===id); if(!item) return; selected=item.name; editId=id; $('modalTitle').textContent='עריכת '+item.name; $('qty').value=item.qty||''; $('note').value=item.note||''; $('confirmAdd').textContent='שמור שינוי'; $('modal').classList.add('show'); }
document.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b) return; if(b.dataset.tab){ active=b.dataset.tab; renderAll(); return; } const act=b.dataset.action; const name=b.dataset.name; if(act==='add') openAdd(name); if(act==='fav'){ const p=products.find(x=>x.name===name); setFavorite(name,!isFav(name),p?p.category:'אחר'); showToast(isFav(name)?'הוסר/עודכן ברשימת הבית':'עודכן'); } if(act==='image'){ pendingImageProduct=name; $('productImageInput').click(); } if(act==='editCart') openEdit(b.dataset.id); if(act==='delCart') writeRemove('cart',b.dataset.id); if(act==='done'){ const item=cart.find(x=>x.id===b.dataset.id); if(item) writePush('history',{name:item.name,qty:item.qty||'',note:item.note||'',boughtAt:Date.now()}); writeRemove('cart',b.dataset.id); } });
$('confirmAdd').onclick=()=>{ if(!selected) return; const payload={name:selected,qty:$('qty').value.trim(),note:$('note').value.trim(),updatedAt:Date.now()}; if(editId) writeUpdate('cart',editId,payload); else writePush('cart',{...payload,createdAt:Date.now()}); $('modal').classList.remove('show'); selected=null; editId=null; };
$('cancel').onclick=()=>{ $('modal').classList.remove('show'); selected=null; editId=null; }; $('modal').onclick=e=>{ if(e.target.id==='modal') $('cancel').click(); };
$('manualBtn').onclick=()=>{ const n=$('manualName').value.trim(); if(!n) return; const cat=$('manualCat').value||'אחר'; if(!products.some(p=>p.name===n)) writePush('customProducts',{name:n,category:cat,imageData:manualImageData||'',createdAt:Date.now()}); else if(manualImageData) saveProductImage(n,manualImageData); $('manualName').value=''; $('manualImage').value=''; manualImageData=''; openAdd(n); };
$('manualImage').onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(!f){manualImageData='';return;} resizeImageFile(f,data=>{ manualImageData=data; showToast('📷 תמונה נבחרה לפריט החדש'); }); };
$('productImageInput').onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(!f||!pendingImageProduct) return; const name=pendingImageProduct; resizeImageFile(f,data=>{ saveProductImage(name,data); pendingImageProduct=null; $('productImageInput').value=''; }); };
$('search').oninput=renderAll;
rebuildProducts(); renderAll(); setTimeout(initFirebase, 300);
</script>
</body></html>
