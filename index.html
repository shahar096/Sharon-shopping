      ['תפוח ירוק','ירקות ופירות'],['אפרסק','ירקות ופירות'],['פלפל אדום','ירקות ופירות'],['פלפל צהוב','ירקות ופירות'],['פלפל כתום','ירקות ופירות'],['עגבניות','ירקות ופירות'],['עגבניות שרי','ירקות ופירות'],['מלפפון','ירקות ופירות'],['אבוקדו','ירקות ופירות'],['חסה לבבות','ירקות ופירות'],['חסה ערבית','ירקות ופירות'],['חסה קיסר','ירקות ופירות'],['בצל לבן','ירקות ופירות'],['בצל סגול','ירקות ופירות'],['תפו\'א','ירקות ופירות'],['בטטה','ירקות ופירות'],['בננות','ירקות ופירות'],['לימון','ירקות ופירות'],['שום','ירקות ופירות'],['פטרוזיליה','ירקות ופירות'],['בזיליקום','ירקות ופירות'],['עלי טימין','ירקות ופירות'],['עלי זעתר','ירקות ופירות'],['נענע','ירקות ופירות'],['כרובית','ירקות ופירות'],['קישוא','ירקות ופירות'],['גזר','ירקות ופירות'],['כרישה','ירקות ופירות'],['כרוב לבן','ירקות ופירות'],['אבטיח','ירקות ופירות'],['חציל','ירקות ופירות'],['חבילת תמרים גדולה','ירקות ופירות'],['פטריות פורטבלו גדולות','ירקות ופירות'],['פטריות שמפיניון','ירקות ופירות'],['פטריות ארוכות','ירקות ופירות'],['קלח תירס לבן','ירקות ופירות'],

    const hebrewSorter = new Intl.Collator('he');
    const $ = id => document.getElementById(id);

    let customProducts = [];
    let products = [];
    let cats = [];
    let active = 'הכל';
    let selected = null;
    let editId = null;
    let cart = [];
    let visibleProducts = [];

    function categoryIndex(cat) {
      const i = categoryOrder.indexOf(cat || 'אחר');
      return i === -1 ? 999 : i;
    }

    function productCategory(name) {
      const p = products.find(x => x[0] === name);
      return p ? p[1] : 'אחר';
    }

    function sortProducts(arr) {
      return [...arr].sort((a,b) => categoryIndex(a[1]) - categoryIndex(b[1]) || hebrewSorter.compare(a[0], b[0]));
    }

    function sortCart(arr) {
      return [...arr].sort((a,b) => categoryIndex(productCategory(a.name)) - categoryIndex(productCategory(b.name)) || hebrewSorter.compare(a.name, b.name));
    }

    function rebuildProducts() {
      products = sortProducts([...defaultProducts, ...customProducts]);
      const existing = [...new Set(products.map(p => p[1]))];
      cats = ['הכל', ...categoryOrder.filter(c => existing.includes(c)), ...existing.filter(c => !categoryOrder.includes(c)).sort(hebrewSorter.compare)];
      if (!cats.includes(active)) active = 'הכל';
      renderTabs();
      renderItems();
      renderCart();
    }

    function persistProduct(name, cat) {
      const clean = name.trim();
      if (!clean) return;
      if (products.some(p => p[0] === clean)) return;
      customProductsRef.push({ name: clean, category: cat || 'אחר', createdAt: Date.now() });
    }

    function renderManualCategories() {
      const select = $('manualCat');
      if (!select) return;
      const options = cats.filter(c => c !== 'הכל');
      select.innerHTML = options.map(c => `<option value="${c}">${c}</option>`).join('');
      if (active !== 'הכל' && options.includes(active)) select.value = active;
    }

    function renderTabs() {
      $('tabs').innerHTML = cats.map(c => `<button class="tab ${c===active?'active':''}" data-cat="${c}">${c}</button>`).join('');
      document.querySelectorAll('.tab').forEach(btn => {
        btn.onclick = () => {
          active = btn.dataset.cat;
          renderTabs();
          renderManualCategories();
          renderItems();
        };
      });
      renderManualCategories();
    }

      return `<div class="item"><b>${p[0]}</b><span class="cat">${p[1]}</span><button class="add" data-idx="${idx}">+ הוסף</button></div>`;
    }

      document.querySelectorAll('.add[data-idx]').forEach(btn => {
        btn.onclick = () => {
          const product = visibleProducts[Number(btn.dataset.idx)];
          if (product) openAdd(product[0]);
        };
      });
    }

    function renderItems() {
      const q = $('search').value.trim();
      const filtered = sortProducts(products.filter(p => (active === 'הכל' || p[1] === active) && (!q || p[0].includes(q) || p[1].includes(q))));
      visibleProducts = filtered;

      const targetResults = $('items');
      const targetCatalog = $('catalog');
      const resultsPanel = $('resultsPanel');

      if (q) {
        resultsPanel.classList.remove('hide');
        targetResults.innerHTML = filtered.length ? filtered.map((p, idx) => itemCard(p, idx)).join('') : '<div class="empty">לא נמצאו מוצרים</div>';
      } else {
        resultsPanel.classList.add('hide');
        targetResults.innerHTML = '';
      }

      if (active !== 'הכל') {
        targetCatalog.innerHTML = filtered.length ? filtered.map((p, idx) => itemCard(p, idx)).join('') : '<div class="empty">לא נמצאו מוצרים</div>';
      } else {
        let html = '';
        cats.filter(c => c !== 'הכל').forEach(c => {
          const group = filtered.filter(p => p[1] === c);
          if (!group.length) return;
          html += `<div class="groupTitle">${c} <small>(${group.length})</small></div><div class="itemsGroup">`;
          group.forEach(p => {
            const idx = visibleProducts.indexOf(p);
            html += itemCard(p, idx);
          });
          html += '</div>';
        });
        targetCatalog.innerHTML = html || '<div class="empty">לא נמצאו מוצרים</div>';
      }

      bindAddButtons();
    }

    function renderCart() {
      $('countPill').textContent = cart.length + ' פריטים ממתינים לקנייה';
      if (!cart.length) {
        $('cart').innerHTML = '<div class="empty">אין כרגע פריטים לקנייה</div>';
        return;
      }

      const sorted = sortCart(cart);
      const allCats = [...categoryOrder, ...new Set(sorted.map(x => productCategory(x.name)).filter(c => !categoryOrder.includes(c)))];
      let html = '';

      allCats.forEach(c => {
        const group = sorted.filter(x => productCategory(x.name) === c);
        if (!group.length) return;
        html += `<div class="groupTitle">${c} <small>(${group.length})</small></div>`;
        group.forEach(x => {
          html += `<div class="cartItem"><div class="cartTop"><div><b>${x.name}</b><div class="meta">${x.qty || 'ללא כמות'}${x.note ? ' · ' + x.note : ''}</div></div><div class="iconActions"><button class="iconBtn edit" data-edit="${x.id}" title="עריכה">✏️</button><button class="iconBtn delete" data-delete="${x.id}" title="מחיקה">🗑️</button><button class="iconBtn done" data-id="${x.id}" title="נקנה">✅</button></div></div></div>`;
        });
      });

      $('cart').innerHTML = html;
      document.querySelectorAll('.iconBtn.done[data-id]').forEach(btn => {
        btn.onclick = () => markBought(btn.dataset.id);
      });
      document.querySelectorAll('.iconBtn.delete[data-delete]').forEach(btn => {
        btn.onclick = () => deleteItem(btn.dataset.delete);
      });
      document.querySelectorAll('.iconBtn.edit[data-edit]').forEach(btn => {
        btn.onclick = () => openEdit(btn.dataset.edit);
      });
    }

    function openAdd(name) {
      selected = name;
      editId = null;
      $('modalTitle').textContent = name;
      $('confirmAdd').textContent = 'הוסף לרשימה';
      $('qty').value = '';
      $('note').value = '';
      $('modal').classList.add('show');
      setTimeout(() => $('qty').focus(), 100);
    }

    function openEdit(id) {
      const item = cart.find(x => x.id === id);
      if (!item) return;
      selected = item.name;
      editId = id;
      $('modalTitle').textContent = 'עריכת ' + item.name;
      $('confirmAdd').textContent = 'שמור שינוי';
      $('qty').value = item.qty || '';
      $('note').value = item.note || '';
      $('modal').classList.add('show');
      setTimeout(() => $('qty').focus(), 100);
    }

    function markBought(id) {
      cartRef.child(id).remove();
    }

    function deleteItem(id) {
      cartRef.child(id).remove();
    }

    function addToCart(item) {
      cartRef.push(item);
    }

    $('confirmAdd').onclick = () => {
      if (!selected) return;
      const payload = {
        name: selected,
        qty: $('qty').value.trim(),
        note: $('note').value.trim(),
        updatedAt: Date.now()
      };

      if (editId) {
        cartRef.child(editId).update(payload);
      } else {
        addToCart({ ...payload, createdAt: Date.now() });
      }

      $('modal').classList.remove('show');
      selected = null;
      editId = null;
      $('confirmAdd').textContent = 'הוסף לרשימה';
    };

    $('cancel').onclick = () => { $('modal').classList.remove('show'); editId = null; selected = null; $('confirmAdd').textContent = 'הוסף לרשימה'; };
    $('modal').onclick = e => { if (e.target.id === 'modal') $('modal').classList.remove('show'); };
    $('search').oninput = renderItems;

    $('manualBtn').onclick = () => {
      const n = $('manualName').value.trim();
      if (n) {
        const cat = $('manualCat').value || (active === 'הכל' ? 'אחר' : active);
        persistProduct(n, cat);
        openAdd(n);
        $('manualName').value = '';
      }
    };

    customProductsRef.on('value', snap => {
      const val = snap.val() || {};
      customProducts = Object.values(val).map(x => [x.name, x.category || 'אחר']);
      rebuildProducts();
    });

    cartRef.on('value', snap => {
      const val = snap.val() || {};
      cart = sortCart(Object.entries(val).map(([id, x]) => ({ id, ...x })));
      renderCart();
    });

    rebuildProducts();
  </script>

</body>
</html>
